spring.application.name=multipartx
server.port=8080

# PostgreSQL Settings
spring.datasource.url=jdbc:postgresql://localhost:5432/multipartx_db
spring.datasource.username=postgres
spring.datasource.password=yourpassword
spring.jpa.hibernate.ddl-auto=update

# Maximum payload file thresholds for your normal upload pathways
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Infrastructure AWS Connection Parameter configurations
aws.access-key=YOUR_AWS_ACCESS_KEY
aws.secret-key=YOUR_AWS_SECRET_KEY
aws.region=us-east-1
aws.s3.bucket-name=multipartx-storage-bucket